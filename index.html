<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title id="siteTitle">thenewtips | Ethical Learning</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#0e0e0e;
  color:white;
}
header{
  background:#111;
  padding:15px;
  text-align:center;
  font-size:20px;
  font-weight:bold;
  border-bottom:2px solid red;
}
nav{
  display:flex;
  justify-content:space-around;
  background:#1a1a1a;
  padding:10px;
}
nav button{
  background:none;
  border:none;
  color:white;
  font-size:16px;
}
nav button:hover{color:red;}
.section{display:none; padding:15px;}
.active{display:block;}
.box{
  background:#1c1c1c;
  padding:15px;
  border-radius:10px;
  margin-bottom:15px;
}
input,textarea,button{
  width:100%;
  padding:10px;
  margin-top:10px;
  border-radius:6px;
  border:none;
}
input,textarea{background:#333;color:white;}
button{
  background:red;
  color:white;
  font-weight:bold;
}
.video-card img{
  width:100%;
  border-radius:10px;
}
iframe{
  width:100%;
  height:220px;
  border-radius:10px;
  margin-top:10px;
}
.tool-btn{
  display:block;
  text-align:center;
  background:#222;
  padding:12px;
  border-radius:8px;
  margin-bottom:10px;
  color:white;
  text-decoration:none;
}
.tool-btn:hover{background:red;}
.hidden{display:none;}
</style>
</head>

<body>

<header id="headerTitle">thenewtips Ethical Platform</header>

<!-- LOGIN -->
<div class="box" id="loginBox">
<h3>Login / Register</h3>
<input type="number" id="mobile" placeholder="Mobile Number">
<input type="password" id="password" placeholder="Password">
<button onclick="login()">Login</button>
</div>

<!-- MAIN -->
<div id="mainBox" class="hidden">

<nav>
<button onclick="show('home')">Home</button>
<button onclick="show('videos')">Videos</button>
<button onclick="show('tools')">Tools</button>
<button onclick="logout()">Logout</button>
</nav>

<!-- HOME -->
<div id="home" class="section active">
<div class="box">
<h3>Ethical Hacking</h3>
<p id="homeText"></p>
<hr>
<h4>Disclaimer</h4>
<p>
This website is only for educational purposes.  
Any misuse of information is not our responsibility.
</p>
</div>
</div>

<!-- VIDEOS -->
<div id="videos" class="section">
<div id="videoList"></div>
</div>

<!-- TOOLS -->
<div id="tools" class="section">
<a class="tool-btn" href="https://github.com/zphisher/zphisher" target="_blank">Zphisher Tool</a>
<a class="tool-btn" href="https://github.com/htr-tech/nexphisher" target="_blank">NexPhisher Tool</a>
<a class="tool-btn" href="https://github.com/sqlmapproject/sqlmap" target="_blank">SQLMap Tool</a>
<a class="tool-btn" href="https://github.com/beefproject/beef" target="_blank">BeEF Framework</a>
</div>

</div>

<!-- ADMIN PANEL -->
<div id="adminPanel" class="hidden">
<div class="box">
<h3>Admin Panel</h3>

<input id="titleEdit" placeholder="Website Title">
<textarea id="homeEdit" placeholder="Home page text"></textarea>
<button onclick="saveContent()">Save Content</button>

<input id="videoLink" placeholder="YouTube Video Link">
<button onclick="addVideo()">Add Video</button>

<button onclick="logout()">Logout</button>
</div>
</div>

<script>
const ADMIN_M="9399687115";
const ADMIN_P="seetaram1";

homeText.innerText =
localStorage.getItem("homeText") ||
"Ethical hacking is the practice of identifying security weaknesses with proper permission to improve system safety.";

function login(){
  if(mobile.value===ADMIN_M && password.value===ADMIN_P){
    loginBox.classList.add("hidden");
    adminPanel.classList.remove("hidden");
    titleEdit.value=localStorage.getItem("title")||"thenewtips Ethical Platform";
    homeEdit.value=homeText.innerText;
    loadVideos();
    return;
  }
  localStorage.setItem("user","ok");
  loginBox.classList.add("hidden");
  mainBox.classList.remove("hidden");
  loadVideos();
}

function logout(){location.reload();}

function show(id){
  document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

function saveContent(){
  localStorage.setItem("title",titleEdit.value);
  localStorage.setItem("homeText",homeEdit.value);
  siteTitle.innerText=titleEdit.value;
  headerTitle.innerText=titleEdit.value;
  homeText.innerText=homeEdit.value;
  alert("Updated");
}

function getId(url){
  let m=url.match(/(?:v=|\.be\/)([^&]+)/);
  return m?m[1]:null;
}

function addVideo(){
  let id=getId(videoLink.value);
  if(!id)return alert("Valid link dalo");
  let v=JSON.parse(localStorage.getItem("videos")||"[]");
  v.push(id);
  localStorage.setItem("videos",JSON.stringify(v));
  videoLink.value="";
  loadVideos();
}

function loadVideos(){
  let v=JSON.parse(localStorage.getItem("videos")||"[]");
  let html="";
  v.slice().reverse().forEach(i=>{
    html+=`
    <div class="box video-card">
      <img src="https://img.youtube.com/vi/${i}/hqdefault.jpg">
      <iframe src="https://www.youtube.com/embed/${i}" allowfullscreen></iframe>
    </div>`;
  });
  videoList.innerHTML=html;
}
</script>

</body>
</html>
