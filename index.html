<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>thenewtips Website</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
  font-family: Arial, sans-serif;
  background:#f2f2f2;
  margin:0;
}
header{
  background:#ff0000;
  color:#fff;
  padding:15px;
  text-align:center;
}
.box{
  background:#fff;
  margin:15px;
  padding:15px;
  border-radius:8px;
}
input,button{
  width:100%;
  padding:10px;
  margin:8px 0;
}
button{
  background:#ff0000;
  color:white;
  border:none;
  cursor:pointer;
}
button:hover{
  background:#cc0000;
}
.hidden{display:none;}
iframe{
  width:100%;
  height:220px;
  margin-bottom:10px;
  border-radius:8px;
}
</style>
</head>

<body>

<header>
  <h2>thenewtips Official Website</h2>
</header>

<!-- REGISTER -->
<div class="box" id="registerBox">
  <h3>Register</h3>
  <input type="number" id="regMobile" placeholder="Mobile Number">
  <input type="password" id="regPass" placeholder="Password">
  <button onclick="register()">Register</button>
  <p>Already registered? <a href="#" onclick="showLogin()">Login</a></p>
</div>

<!-- LOGIN -->
<div class="box hidden" id="loginBox">
  <h3>Login</h3>
  <input type="number" id="logMobile" placeholder="Mobile Number">
  <input type="password" id="logPass" placeholder="Password">
  <button onclick="login()">Login</button>
</div>

<!-- HOME -->
<div class="box hidden" id="homeBox">
  <h3>Welcome to thenewtips</h3>

  <h4>Latest Videos</h4>

  <iframe src="https://www.youtube.com/embed/9bZkp7q19f0"></iframe>
  <iframe src="https://www.youtube.com/embed/l482T0yNkeo"></iframe>
  <iframe src="https://www.youtube.com/embed/3tmd-ClpJxA"></iframe>

  <button onclick="openAdmin()">Admin Panel</button>
  <button onclick="logout()">Logout</button>
</div>

<!-- ADMIN LOGIN -->
<div class="box hidden" id="adminLogin">
  <h3>Admin Login</h3>
  <input type="password" id="adminPass" placeholder="Admin Password">
  <button onclick="adminLogin()">Login</button>
</div>

<!-- ADMIN PANEL -->
<div class="box hidden" id="adminPanel">
  <h3>Admin Panel</h3>
  <p>✔ Website working<br>✔ User login system active</p>
  <button onclick="alert('Future update: Add / Remove videos')">Edit Videos</button>
  <button onclick="adminLogout()">Logout Admin</button>
</div>

<script>
function register(){
  let m = regMobile.value;
  let p = regPass.value;
  if(m.length<10 || p.length<4){
    alert("Valid mobile & password daalo");
    return;
  }
  localStorage.setItem("userMobile",m);
  localStorage.setItem("userPass",p);
  alert("Register successful");
  showLogin();
}

function showLogin(){
  registerBox.classList.add("hidden");
  loginBox.classList.remove("hidden");
}

function login(){
  let m = logMobile.value;
  let p = logPass.value;
  if(m===localStorage.getItem("userMobile") &&
     p===localStorage.getItem("userPass")){
    loginBox.classList.add("hidden");
    homeBox.classList.remove("hidden");
  }else{
    alert("Wrong login details");
  }
}

function logout(){
  location.reload();
}

function openAdmin(){
  homeBox.classList.add("hidden");
  adminLogin.classList.remove("hidden");
}

function adminLogin(){
  if(adminPass.value==="admin123"){
    adminLogin.classList.add("hidden");
    adminPanel.classList.remove("hidden");
  }else{
    alert("Wrong admin password");
  }
}

function adminLogout(){
  adminPanel.classList.add("hidden");
  homeBox.classList.remove("hidden");
}
</script>

</body>
</html>
