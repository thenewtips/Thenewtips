<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>thenewtips | Official</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#0f0f0f;
  color:white;
}
header{
  background:#111;
  padding:15px;
  text-align:center;
  font-size:20px;
  font-weight:bold;
  letter-spacing:1px;
  border-bottom:2px solid red;
}
.container{
  padding:15px;
}
.box{
  background:#1c1c1c;
  padding:15px;
  border-radius:10px;
  margin-bottom:15px;
}
input,button{
  width:100%;
  padding:10px;
  margin-top:10px;
  border-radius:6px;
  border:none;
}
input{
  background:#333;
  color:white;
}
button{
  background:red;
  color:white;
  font-weight:bold;
  cursor:pointer;
}
button:hover{
  background:#cc0000;
}
.hidden{display:none;}
.video-card{
  background:#1c1c1c;
  padding:10px;
  border-radius:10px;
  margin-bottom:15px;
}
.video-card img{
  width:100%;
  border-radius:10px;
}
iframe{
  width:100%;
  height:220px;
  border-radius:10px;
  margin-top:10px;
}
</style>
</head>

<body>

<header>thenewtips Official Website</header>

<div class="container">

<!-- REGISTER -->
<div class="box" id="registerBox">
<h3>Register</h3>
<input type="number" id="regMobile" placeholder="Mobile Number">
<input type="password" id="regPass" placeholder="Password">
<button onclick="register()">Register</button>
<p>Already account? <a href="#" onclick="showLogin()" style="color:red;">Login</a></p>
</div>

<!-- LOGIN -->
<div class="box hidden" id="loginBox">
<h3>Login</h3>
<input type="number" id="logMobile" placeholder="Mobile Number">
<input type="password" id="logPass" placeholder="Password">
<button onclick="login()">Login</button>
</div>

<!-- HOME -->
<div id="homeBox" class="hidden">
<h3>Latest Videos</h3>
<div id="videoList"></div>
<button onclick="logout()">Logout</button>
</div>

<!-- ADMIN PANEL -->
<div id="adminPanel" class="hidden">
<div class="box">
<h3>Admin Panel</h3>
<input type="text" id="videoLink" placeholder="Paste YouTube Video Link">
<button onclick="addVideo()">Add Video</button>
<button onclick="logout()">Logout</button>
</div>
</div>

</div>

<script>
const ADMIN_MOBILE = "9399687115";
const ADMIN_PASS = "seetaram1";

function register(){
  let m = regMobile.value;
  let p = regPass.value;
  if(m.length<10 || p.length<4){
    alert("Valid details daalo");
    return;
  }
  localStorage.setItem("userMobile",m);
  localStorage.setItem("userPass",p);
  alert("Register Successful");
  showLogin();
}

function showLogin(){
  registerBox.classList.add("hidden");
  loginBox.classList.remove("hidden");
}

function login(){
  let m = logMobile.value;
  let p = logPass.value;

  if(m===ADMIN_MOBILE && p===ADMIN_PASS){
    loginBox.classList.add("hidden");
    adminPanel.classList.remove("hidden");
    loadVideos();
    return;
  }

  if(m===localStorage.getItem("userMobile") &&
     p===localStorage.getItem("userPass")){
    loginBox.classList.add("hidden");
    homeBox.classList.remove("hidden");
    loadVideos();
  }else{
    alert("Wrong login details");
  }
}

function logout(){
  location.reload();
}

function getVideoId(url){
  let regExp = /(?:youtube\.com.*(?:\?|&)v=|youtu\.be\/)([^&#]+)/;
  let match = url.match(regExp);
  return match ? match[1] : null;
}

function addVideo(){
  let link = videoLink.value;
  let id = getVideoId(link);
  if(!id){
    alert("Valid YouTube link daalo");
    return;
  }
  let videos = JSON.parse(localStorage.getItem("videos") || "[]");
  videos.push(id);
  localStorage.setItem("videos",JSON.stringify(videos));
  videoLink.value="";
  loadVideos();
}

function loadVideos(){
  let videos = JSON.parse(localStorage.getItem("videos") || "[]");
  let html="";
  videos.reverse().forEach(id=>{
    html+=`
    <div class="video-card">
      <img src="https://img.youtube.com/vi/${id}/hqdefault.jpg">
      <iframe src="https://www.youtube.com/embed/${id}" allowfullscreen></iframe>
    </div>`;
  });
  videoList.innerHTML=html;
}
</script>

</body>
</html>
