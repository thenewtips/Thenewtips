<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title id="siteTitle">thenewtips | Ethical Learning Hub</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
  margin:0;
  font-family:Segoe UI, Arial;
  background:#0d0d0d;
  color:#fff;
}
header{
  padding:18px;
  text-align:center;
  font-size:22px;
  font-weight:700;
  background:#111;
  border-bottom:2px solid red;
}
nav{
  display:flex;
  justify-content:space-around;
  background:#1a1a1a;
  padding:12px 0;
}
nav button{
  background:none;
  border:none;
  color:#fff;
  font-size:16px;
}
nav button:hover{color:red;}
.container{padding:15px;}
.section{display:none;}
.active{display:block;}
.box{
  background:#1f1f1f;
  padding:18px;
  border-radius:14px;
  margin-bottom:18px;
}
input,textarea,button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:8px;
  border:none;
}
input,textarea{background:#333;color:#fff;}
button{
  background:red;
  color:#fff;
  font-weight:600;
}
.hidden{display:none;}
img.hero{
  width:100%;
  border-radius:12px;
  margin-top:12px;
}
.video-card img{
  width:100%;
  border-radius:12px;
}
iframe{
  width:100%;
  height:240px;
  border-radius:12px;
  margin-top:10px;
}
.tool-card{
  display:flex;
  gap:12px;
  background:#242424;
  padding:12px;
  border-radius:12px;
  margin-bottom:12px;
}
.tool-card img{
  width:60px;
  height:60px;
  border-radius:10px;
}
.del{
  background:#444;
  margin-top:8px;
}
.dashboard{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
}
.stat{
  background:#292929;
  padding:12px;
  border-radius:10px;
  text-align:center;
}
</style>
</head>

<body>

<header id="headerTitle">thenewtips | Ethical Learning Hub</header>

<!-- LOGIN -->
<div class="container" id="loginBox">
<div class="box">
<h3>Login / Register</h3>
<input id="mobile" placeholder="Mobile Number">
<input id="password" type="password" placeholder="Password">
<button onclick="login()">Login</button>
</div>
</div>

<!-- MAIN -->
<div id="mainBox" class="hidden">
<nav>
<button onclick="show('home')">Home</button>
<button onclick="show('videos')">Videos</button>
<button onclick="show('tools')">Tools</button>
<button onclick="logout()">Logout</button>
</nav>

<div class="container">

<!-- HOME -->
<div id="home" class="section active">
<div class="box">
<h3>Ethical Hacking & Cyber Security</h3>
<p id="homeText"></p>

<img class="hero" src="https://images.unsplash.com/photo-1605902711622-cfb43c44367f">
<img class="hero" src="https://images.unsplash.com/photo-1550751827-4bd374c3f58b">
<img class="hero" src="https://images.unsplash.com/photo-1591696205602-2f950c417cb9">

<h4>Disclaimer</h4>
<p>
This website is for educational purposes only.  
Any misuse of information is strictly prohibited.
</p>
</div>
</div>

<!-- VIDEOS -->
<div id="videos" class="section">
<div id="videoList"></div>
</div>

<!-- TOOLS -->
<div id="tools" class="section">
<div id="toolList"></div>
</div>

</div>
</div>

<!-- ADMIN PANEL -->
<div id="adminPanel" class="hidden">
<div class="container">
<div class="box">
<h3>Admin Dashboard</h3>

<div class="dashboard">
<div class="stat">Users<br><b id="uCount">0</b></div>
<div class="stat">Logins<br><b id="lCount">0</b></div>
<div class="stat">Videos<br><b id="vCount">0</b></div>
<div class="stat">Tools<br><b id="tCount">0</b></div>
</div>

<hr>

<input id="titleEdit" placeholder="Website Title">
<textarea id="homeEdit" placeholder="Home page text"></textarea>
<button onclick="saveText()">Save Text</button>

<hr>

<input id="videoLink" placeholder="YouTube Video Link">
<button onclick="addVideo()">Add Video</button>

<hr>

<input id="toolName" placeholder="Tool Name">
<input id="toolImg" placeholder="Tool Image URL">
<input id="toolLink" placeholder="Tool GitHub Link">
<textarea id="toolDesc" placeholder="Tool description"></textarea>
<button onclick="addTool()">Add Tool</button>

<button onclick="logout()">Logout</button>
</div>
</div>
</div>

<script>
const ADMIN_M="9399687115";
const ADMIN_P="seetaram1";

homeText.innerText =
localStorage.getItem("homeText") ||
"Ethical hacking helps organizations improve cyber security by identifying vulnerabilities legally.";

function login(){
  let lc=+localStorage.getItem("logins")||0;
  localStorage.setItem("logins",++lc);

  if(mobile.value===ADMIN_M && password.value===ADMIN_P){
    localStorage.setItem("session","admin");
    location.reload(); return;
  }
  let uc=+localStorage.getItem("users")||0;
  localStorage.setItem("users",++uc);
  localStorage.setItem("session","user");
  location.reload();
}

if(localStorage.getItem("session")==="user"){
  loginBox.classList.add("hidden");
  mainBox.classList.remove("hidden");
}
if(localStorage.getItem("session")==="admin"){
  loginBox.classList.add("hidden");
  adminPanel.classList.remove("hidden");
  loadDashboard();
}

function logout(){
  localStorage.removeItem("session");
  location.reload();
}

function show(id){
  document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

function saveText(){
  localStorage.setItem("homeText",homeEdit.value);
  homeText.innerText=homeEdit.value;
  alert("Updated");
}

function getId(u){
  let m=u.match(/(?:v=|\.be\/)([^&]+)/);
  return m?m[1]:null;
}

function addVideo(){
  let id=getId(videoLink.value);
  if(!id)return alert("Valid link");
  let v=JSON.parse(localStorage.getItem("videos")||"[]");
  v.push(id);
  localStorage.setItem("videos",JSON.stringify(v));
  loadVideos(); loadDashboard();
}

function loadVideos(){
  let v=JSON.parse(localStorage.getItem("videos")||"[]");
  videoList.innerHTML=v.map((i,idx)=>`
  <div class="box video-card">
    <img src="https://img.youtube.com/vi/${i}/hqdefault.jpg">
    <iframe src="https://www.youtube.com/embed/${i}" allowfullscreen></iframe>
    ${localStorage.getItem("session")==="admin"
      ? `<button class="del" onclick="delVideo(${idx})">Remove</button>`:""}
  </div>`).join("");
}
function delVideo(i){
  let v=JSON.parse(localStorage.getItem("videos"));
  v.splice(i,1);
  localStorage.setItem("videos",JSON.stringify(v));
  loadVideos(); loadDashboard();
}
loadVideos();

function addTool(){
  let t=JSON.parse(localStorage.getItem("tools")||"[]");
  t.push({n:toolName.value,i:toolImg.value,l:toolLink.value,d:toolDesc.value});
  localStorage.setItem("tools",JSON.stringify(t));
  loadTools(); loadDashboard();
}
function loadTools(){
  let t=JSON.parse(localStorage.getItem("tools")||"[]");
  toolList.innerHTML=t.map((x,i)=>`
  <div class="tool-card">
    <img src="${x.i}">
    <div>
      <b>${x.n}</b>
      <p>${x.d}</p>
      <a href="${x.l}" target="_blank">Open</a>
      ${localStorage.getItem("session")==="admin"
        ? `<button class="del" onclick="delTool(${i})">Remove</button>`:""}
    </div>
  </div>`).join("");
}
function delTool(i){
  let t=JSON.parse(localStorage.getItem("tools"));
  t.splice(i,1);
  localStorage.setItem("tools",JSON.stringify(t));
  loadTools(); loadDashboard();
}
loadTools();

function loadDashboard(){
  uCount.innerText=localStorage.getItem("users")||0;
  lCount.innerText=localStorage.getItem("logins")||0;
  vCount.innerText=(JSON.parse(localStorage.getItem("videos")||"[]")).length;
  tCount.innerText=(JSON.parse(localStorage.getItem("tools")||"[]")).length;
}
</script>

</body>
</html>
