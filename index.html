<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>thenewtips | Ethical Learning</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body{margin:0;font-family:Arial;background:#f4f6f9}
header{background:#111;color:#fff;padding:15px;text-align:center;font-size:22px;font-weight:bold}
.container{padding:15px}
.box{background:#fff;padding:15px;border-radius:10px;margin-bottom:15px;box-shadow:0 3px 8px rgba(0,0,0,.1)}
input,button,textarea{width:100%;padding:10px;margin-top:8px;border-radius:6px;border:1px solid #ccc}
button{background:#007bff;color:#fff;font-weight:bold;border:none}
button:hover{background:#0056b3}
.hidden{display:none}
nav{display:flex;justify-content:space-around;background:#fff;padding:10px;box-shadow:0 2px 5px rgba(0,0,0,.1)}
nav button{background:none;border:none;font-weight:bold}
.section{display:none}
.active{display:block}
iframe{width:100%;height:220px;border-radius:10px;margin-top:8px}
.delBtn{background:#dc3545;margin-top:8px}
.adminBar{background:#222;color:#fff;text-align:center;padding:8px}
.adminBar button{width:auto;margin:4px;background:#ff9800}
</style>
</head>

<body>

<header>thenewtips | Ethical Learning</header>

<!-- LOGIN / REGISTER -->
<div id="authBox" class="container">
<div class="box">
<h3 id="authTitle">Login</h3>
<input id="mobile" placeholder="Mobile Number">
<input id="password" type="password" placeholder="Password">
<button onclick="doAuth()">Login</button>
<p style="text-align:center;margin-top:10px">
<span id="toggleText">New user?</span>
<a href="#" onclick="toggleAuth()"> Register here</a>
</p>
</div>
</div>

<!-- MAIN -->
<div id="main" class="hidden">

<div id="adminBar" class="adminBar hidden">
Admin Mode
<button onclick="toggleEdit()">Edit Mode</button>
<button onclick="logout()">Logout</button>
</div>

<nav>
<button onclick="show('home')">Home</button>
<button onclick="show('videos')">Videos</button>
<button onclick="show('tools')">Tools</button>
<button onclick="logout()">Logout</button>
</nav>

<div class="container">

<div id="home" class="section active">
<div class="box">
<h3>Ethical Hacking</h3>
<p id="homeText"></p>

<div id="homeEditBox" class="hidden">
<textarea id="homeInput"></textarea>
<button onclick="saveHome()">Save</button>
</div>

<p><b>Disclaimer:</b> Educational purpose only.</p>
</div>
</div>

<div id="videos" class="section">
<div id="videoList"></div>
</div>

<div id="tools" class="section">
<div id="toolList"></div>
</div>

</div>
</div>

<script>
const ADMIN_M="9399687115";
const ADMIN_P="seetaram1";

let isRegister=false;
let isAdmin=false;
let editMode=false;

homeText.innerText=localStorage.getItem("homeText") || 
"Learn ethical hacking legally and responsibly.";

/* TOGGLE LOGIN / REGISTER */
function toggleAuth(){
isRegister=!isRegister;
authTitle.innerText=isRegister?"Register":"Login";
document.querySelector("#authBox button").innerText=isRegister?"Register":"Login";
toggleText.innerText=isRegister?"Already have account?":"New user?";
}

/* LOGIN / REGISTER LOGIC */
function doAuth(){
let users=JSON.parse(localStorage.getItem("users")||"{}");

if(isRegister){
if(users[mobile.value]){alert("User already exists");return;}
users[mobile.value]=password.value;
localStorage.setItem("users",JSON.stringify(users));
alert("Registered successfully, now login");
toggleAuth();
return;
}

/* LOGIN */
if(mobile.value===ADMIN_M && password.value===ADMIN_P){
localStorage.setItem("session","admin");
location.reload();return;
}

if(users[mobile.value]===password.value){
localStorage.setItem("session","user");
location.reload();
}else{
alert("Invalid login");
}
}

/* SESSION CHECK */
if(localStorage.getItem("session")){
authBox.classList.add("hidden");
main.classList.remove("hidden");

if(localStorage.getItem("session")==="admin"){
isAdmin=true;
adminBar.classList.remove("hidden");
}
}

/* LOGOUT */
function logout(){
localStorage.removeItem("session");
location.reload();
}

/* NAV */
function show(id){
document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

/* EDIT MODE */
function toggleEdit(){
editMode=!editMode;
alert("Edit Mode "+(editMode?"ON":"OFF"));
}

/* HOME EDIT */
homeText.onclick=function(){
if(isAdmin && editMode){
homeEditBox.classList.remove("hidden");
homeInput.value=homeText.innerText;
}
}
function saveHome(){
localStorage.setItem("homeText",homeInput.value);
homeText.innerText=homeInput.value;
homeEditBox.classList.add("hidden");
}

/* VIDEOS */
function loadVideos(){
let v=JSON.parse(localStorage.getItem("videos")||"[]");
videoList.innerHTML=v.map((id,i)=>`
<div class="box">
<iframe src="https://www.youtube.com/embed/${id}" allowfullscreen></iframe>
${isAdmin && editMode?`<button class="delBtn" onclick="delVideo(${i})">Delete</button>`:""}
</div>`).join("");
}
function delVideo(i){
let v=JSON.parse(localStorage.getItem("videos")||"[]");
v.splice(i,1);
localStorage.setItem("videos",JSON.stringify(v));
loadVideos();
}
loadVideos();

/* TOOLS */
function loadTools(){
let t=JSON.parse(localStorage.getItem("tools")||"[]");
toolList.innerHTML=t.map((x,i)=>`
<div class="box">
<img src="${x.img}">
<h4>${x.name}</h4>
<p>${x.desc}</p>
<a href="${x.link}" target="_blank">Open</a>
${isAdmin && editMode?`<button class="delBtn" onclick="delTool(${i})">Delete</button>`:""}
</div>`).join("");
}
function delTool(i){
let t=JSON.parse(localStorage.getItem("tools")||"[]");
t.splice(i,1);
localStorage.setItem("tools",JSON.stringify(t));
loadTools();
}
loadTools();
</script>

</body>
</html>
