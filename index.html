<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>thenewtips | Ethical Learning</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
margin:0;
font-family:Arial;
background:#f4f6f9;
color:#222;
}
header{
background:#111;
color:white;
padding:15px;
text-align:center;
font-size:22px;
font-weight:bold;
}
nav{
display:flex;
justify-content:space-around;
background:#ffffff;
padding:10px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}
nav button{
background:none;
border:none;
font-size:15px;
font-weight:bold;
color:#333;
}
nav button:hover{
color:#007bff;
}
.container{
padding:15px;
}
.box{
background:white;
padding:15px;
border-radius:10px;
margin-bottom:15px;
box-shadow:0 3px 8px rgba(0,0,0,0.08);
}
input,textarea,button{
width:100%;
padding:10px;
margin-top:8px;
border-radius:6px;
border:1px solid #ccc;
}
button{
background:#007bff;
color:white;
font-weight:bold;
cursor:pointer;
}
button:hover{
background:#0056b3;
}
.section{display:none;}
.active{display:block;}
.hidden{display:none;}
iframe{
width:100%;
height:220px;
border-radius:10px;
margin-top:8px;
}
img{
width:100%;
border-radius:10px;
margin-top:8px;
}
.delBtn{
background:#dc3545;
margin-top:8px;
}
.adminPanel{
background:#222;
color:white;
padding:10px;
text-align:center;
}
.adminPanel button{
background:#ff9800;
margin:5px;
width:auto;
padding:8px 15px;
}
</style>
</head>

<body>

<header>thenewtips | Ethical Learning</header>

<div id="loginBox" class="container">
<div class="box">
<h3>Login</h3>
<input id="mobile" placeholder="Mobile Number">
<input id="password" type="password" placeholder="Password">
<button onclick="login()">Login</button>
</div>
</div>

<div id="main" class="hidden">

<div id="adminControls" class="adminPanel hidden">
Admin Mode:
<button onclick="toggleEdit()">Edit Mode</button>
<button onclick="viewWebsite()">View Website</button>
<button onclick="logout()">Logout</button>
</div>

<nav>
<button onclick="showSection('home')">Home</button>
<button onclick="showSection('videos')">Videos</button>
<button onclick="showSection('tools')">Tools</button>
</nav>

<div class="container">

<div id="home" class="section active">
<div class="box">
<h3>Ethical Hacking</h3>
<p id="homeText"></p>

<div id="homeEditBox" class="hidden">
<textarea id="homeInput"></textarea>
<button onclick="saveHome()">Save</button>
</div>

<p><b>Disclaimer:</b> Only for educational purpose.</p>
</div>
</div>

<div id="videos" class="section">
<div id="videoList"></div>
</div>

<div id="tools" class="section">
<div id="toolList"></div>
</div>

</div>
</div>

<script>

const ADMIN_M="9399687115";
const ADMIN_P="seetaram1";

let editMode=false;
let isAdmin=false;

homeText.innerText=localStorage.getItem("homeText") || "Learn ethical hacking legally and safely.";

/* LOGIN */
function login(){
if(mobile.value===ADMIN_M && password.value===ADMIN_P){
isAdmin=true;
localStorage.setItem("session","admin");
}else{
localStorage.setItem("session","user");
}
location.reload();
}

if(localStorage.getItem("session")){
loginBox.classList.add("hidden");
main.classList.remove("hidden");

if(localStorage.getItem("session")==="admin"){
isAdmin=true;
adminControls.classList.remove("hidden");
}
}

/* LOGOUT */
function logout(){
localStorage.removeItem("session");
location.reload();
}

/* NAVIGATION */
function showSection(id){
document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

/* EDIT MODE */
function toggleEdit(){
editMode=!editMode;
alert("Edit Mode: "+(editMode?"ON":"OFF"));
}

/* VIEW WEBSITE */
function viewWebsite(){
editMode=false;
alert("View Mode Activated");
}

/* HOME EDIT */
homeText.onclick=function(){
if(isAdmin && editMode){
homeEditBox.classList.remove("hidden");
homeInput.value=homeText.innerText;
}
}

function saveHome(){
localStorage.setItem("homeText",homeInput.value);
homeText.innerText=homeInput.value;
homeEditBox.classList.add("hidden");
}

/* VIDEOS */
function extractID(url){
let match=url.match(/(?:v=|\.be\/)([^&]+)/);
return match?match[1]:null;
}

function loadVideos(){
let videos=JSON.parse(localStorage.getItem("videos")||"[]");
videoList.innerHTML=videos.map((id,i)=>`
<div class="box">
<iframe src="https://www.youtube.com/embed/${id}" allowfullscreen></iframe>
${isAdmin && editMode?`<button class="delBtn" onclick="deleteVideo(${i})">Delete</button>`:""}
</div>
`).join("");
}

function deleteVideo(i){
let videos=JSON.parse(localStorage.getItem("videos")||"[]");
videos.splice(i,1);
localStorage.setItem("videos",JSON.stringify(videos));
loadVideos();
}

loadVideos();

/* TOOLS */
function loadTools(){
let tools=JSON.parse(localStorage.getItem("tools")||"[]");
toolList.innerHTML=tools.map((t,i)=>`
<div class="box">
<img src="${t.img}">
<h4>${t.name}</h4>
<p>${t.desc}</p>
<a href="${t.link}" target="_blank">Open Tool</a>
${isAdmin && editMode?`<button class="delBtn" onclick="deleteTool(${i})">Delete</button>`:""}
</div>
`).join("");
}

function deleteTool(i){
let tools=JSON.parse(localStorage.getItem("tools")||"[]");
tools.splice(i,1);
localStorage.setItem("tools",JSON.stringify(tools));
loadTools();
}

loadTools();

</script>

</body>
</html>
