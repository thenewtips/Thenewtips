<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title id="siteTitle">thenewtips | Ethical Learning Hub</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
  margin:0;
  font-family:Segoe UI, Arial;
  background:linear-gradient(135deg,#0f0f0f,#1a1a1a);
  color:#fff;
}
header{
  padding:18px;
  text-align:center;
  font-size:22px;
  font-weight:700;
  background:#111;
  border-bottom:2px solid #ff0000;
}
nav{
  display:flex;
  justify-content:space-around;
  background:#181818;
  padding:12px 0;
}
nav button{
  background:none;
  border:none;
  color:#fff;
  font-size:16px;
}
nav button:hover{color:#ff0000;}
.container{padding:15px;}
.section{display:none;}
.active{display:block;}
.box{
  background:#1f1f1f;
  padding:18px;
  border-radius:14px;
  margin-bottom:18px;
  box-shadow:0 0 10px rgba(0,0,0,.6);
}
h3,h4{margin-top:0;color:#ff4444;}
input,textarea,button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:8px;
  border:none;
  font-size:15px;
}
input,textarea{background:#333;color:#fff;}
button{
  background:#ff0000;
  color:#fff;
  font-weight:600;
}
button:hover{background:#cc0000;}
.hidden{display:none;}

.video-card img{
  width:100%;
  border-radius:12px;
}
iframe{
  width:100%;
  height:240px;
  border-radius:12px;
  margin-top:12px;
}

.tool-card{
  display:flex;
  gap:12px;
  background:#232323;
  padding:12px;
  border-radius:12px;
  margin-bottom:12px;
}
.tool-card img{
  width:60px;
  height:60px;
  border-radius:10px;
}
.tool-card a{
  color:#ff4444;
  text-decoration:none;
  font-weight:600;
}
</style>
</head>

<body>

<header id="headerTitle">thenewtips | Ethical Learning Hub</header>

<!-- LOGIN -->
<div class="container" id="loginBox">
<div class="box">
<h3>Login / Register</h3>
<input id="mobile" placeholder="Mobile Number">
<input id="password" type="password" placeholder="Password">
<button onclick="login()">Login</button>
</div>
</div>

<!-- MAIN -->
<div id="mainBox" class="hidden">

<nav>
<button onclick="show('home')">Home</button>
<button onclick="show('videos')">Videos</button>
<button onclick="show('tools')">Tools</button>
<button onclick="logout()">Logout</button>
</nav>

<div class="container">

<!-- HOME -->
<div id="home" class="section active">
<div class="box">
<h3>About Ethical Hacking</h3>
<p id="homeText"></p>

<h4>Why This Website?</h4>
<p id="extraText"></p>

<h4>Disclaimer</h4>
<p>
This platform is strictly for educational and awareness purposes only.  
Any misuse of information is not our responsibility.
</p>
</div>
</div>

<!-- VIDEOS -->
<div id="videos" class="section">
<div id="videoList"></div>
</div>

<!-- TOOLS -->
<div id="tools" class="section">
<div id="toolList"></div>
</div>

</div>
</div>

<!-- ADMIN PANEL -->
<div id="adminPanel" class="hidden">
<div class="container">
<div class="box">
<h3>Admin Control Panel</h3>

<input id="titleEdit" placeholder="Website Title">
<textarea id="homeEdit" placeholder="Home main text"></textarea>
<textarea id="extraEdit" placeholder="Why this website text"></textarea>
<button onclick="saveText()">Save Text</button>

<hr>

<input id="videoLink" placeholder="YouTube Video Link">
<button onclick="addVideo()">Add Video</button>

<hr>

<input id="toolName" placeholder="Tool Name">
<input id="toolImg" placeholder="Tool Image URL">
<input id="toolLink" placeholder="Tool GitHub Link">
<textarea id="toolDesc" placeholder="Tool use / description"></textarea>
<button onclick="addTool()">Add Tool</button>

<button onclick="logout()">Logout</button>
</div>
</div>
</div>

<script>
const ADMIN_M="9399687115";
const ADMIN_P="seetaram1";

/* session fix */
if(localStorage.getItem("session")==="user"){
  loginBox.classList.add("hidden");
  mainBox.classList.remove("hidden");
}
if(localStorage.getItem("session")==="admin"){
  loginBox.classList.add("hidden");
  adminPanel.classList.remove("hidden");
}

homeText.innerText =
localStorage.getItem("homeText") ||
"Ethical hacking means testing systems legally to find security weaknesses and help protect users.";

extraText.innerText =
localStorage.getItem("extraText") ||
"This website provides learning resources, videos and tools in a simple and safe way.";

function login(){
  if(mobile.value===ADMIN_M && password.value===ADMIN_P){
    localStorage.setItem("session","admin");
    location.reload();
    return;
  }
  localStorage.setItem("session","user");
  location.reload();
}

function logout(){
  localStorage.removeItem("session");
  location.reload();
}

function show(id){
  document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

function saveText(){
  localStorage.setItem("title",titleEdit.value);
  localStorage.setItem("homeText",homeEdit.value);
  localStorage.setItem("extraText",extraEdit.value);
  siteTitle.innerText=titleEdit.value;
  headerTitle.innerText=titleEdit.value;
  homeText.innerText=homeEdit.value;
  extraText.innerText=extraEdit.value;
  alert("Content Updated");
}

function getId(u){
  let m=u.match(/(?:v=|\.be\/)([^&]+)/);
  return m?m[1]:null;
}

function addVideo(){
  let id=getId(videoLink.value);
  if(!id)return alert("Valid link dalo");
  let v=JSON.parse(localStorage.getItem("videos")||"[]");
  v.push(id);
  localStorage.setItem("videos",JSON.stringify(v));
  loadVideos();
}

function loadVideos(){
  let v=JSON.parse(localStorage.getItem("videos")||"[]");
  videoList.innerHTML=v.reverse().map(i=>`
  <div class="box video-card">
    <img src="https://img.youtube.com/vi/${i}/hqdefault.jpg">
    <iframe src="https://www.youtube.com/embed/${i}" allowfullscreen></iframe>
  </div>`).join("");
}
loadVideos();

function addTool(){
  let t=JSON.parse(localStorage.getItem("tools")||"[]");
  t.push({
    n:toolName.value,
    i:toolImg.value,
    l:toolLink.value,
    d:toolDesc.value
  });
  localStorage.setItem("tools",JSON.stringify(t));
  loadTools();
}

function loadTools(){
  let t=JSON.parse(localStorage.getItem("tools")||"[]");
  toolList.innerHTML=t.map(x=>`
  <div class="tool-card">
    <img src="${x.i}">
    <div>
      <strong>${x.n}</strong>
      <p>${x.d}</p>
      <a href="${x.l}" target="_blank">Open Tool</a>
    </div>
  </div>`).join("");
}
loadTools();
</script>

</body>
</html>
